specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Workday Report Writer
providerId: workday-report-writer
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Reporting
  - Analytics
  - Rate Limiting
description: Workday Report Writer reports exposed as web services or report-as-a-service URLs run inside the parent Workday tenant and inherit tenant-level transactional and integration concurrency limits. Workday does not publish numeric rate limits on its public marketing site; numeric thresholds live in Workday Community / Customer Center documentation behind authentication.
sources:
  - https://www.workday.com/en-us/enterprise-resource-planning.html
notes: No public per-second or per-minute limits documented. Scaffold tier numbers have been removed.
responseCodes: {}
limits:
  - name: Tenant-Inherited Throughput
    scope: tenant
    metric: varies
    limit: governed by the parent Workday tenant; not publicly documented
    notes: Report-as-a-Service URLs and web service reports share the tenant's API capacity envelope.
  - name: Long-Running Report Cancellation
    scope: tenant
    metric: varies
    limit: governed by tenant background process scheduling; not publicly documented
    notes: Workday provides cancellation and runtime guards on long-running reports as part of tenant background process management.
policies:
  - name: Tenant Inheritance
    description: Report Writer reports share the underlying Workday tenant's API quotas; throttling, retries, and integration backoff follow tenant policies.
  - name: Background Processing
    description: Long-running reports are routed through Workday's background process framework, which enforces tenant-level concurrency and runtime guards.
  - name: Customer Center Documentation
    description: Numeric thresholds for Report Writer execution and Report-as-a-Service exposure are published to authenticated Workday customers in Workday Community.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
