    name: Included with Workday Subscription
    type: enterprise
    description: Report Writer (custom report definition, calculated fields, and report-as-a-service URLs / web service exposures) is delivered as part of every Workday tenant. Costs are absorbed in the parent tenant subscription rather than billed separately.
    entries:
      - label: Report Writer Capability
        name: report_writer_capability
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: included with Workday tenant subscription
        userMultiplied: false
    elements:
      - name: Custom Report Definition
      - name: Calculated Fields
      - name: Report-as-a-Service URLs
      - name: Web Service Reports
      - name: Bundled with Workday Tenant
