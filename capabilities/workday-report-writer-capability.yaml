    baseUri: https://wd2-impl-services1.workday.com/api/prismAnalytics/v3/your-tenant
    description: Workday Report Writer Workday Prism Analytics API HTTP API.
    authentication:
      type: bearer
      token: '{{WORKDAY_REPORT_WRITER_TOKEN}}'
    resources:
