      path: /tables
      operations:
      - name: listtables
        method: GET
        description: Workday Report Writer List Prism Analytics Tables
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter tables by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createtable
        method: POST
        description: Workday Report Writer Create a Prism Analytics Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
