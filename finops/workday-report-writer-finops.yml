description: FOCUS-aligned FinOps stub for Workday Report Writer. Report Writer is included in the Workday tenant subscription and is not separately metered or invoiced; meters here describe operational footprint rather than billable units.
sources:
  - https://www.workday.com/en-us/enterprise-resource-planning.html
notes: Report Writer has no separate price. Generic api_request and compute_seconds meters from the scaffold have been removed.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Workday, Inc.
serviceCategory: Reporting / Analytics
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Workday Report Writer
  ServiceCategory: Reporting / Analytics
  ProviderName: Workday
  PublisherName: Workday, Inc.
  InvoiceIssuerName: Workday, Inc.
  BillingCurrency: USD
meters:
  - name: report_writer_capability
    description: Report Writer is bundled into the Workday tenant subscription rather than separately metered; this meter records that the capability is entitled with the tenant.
    unit: month
    aggregation: max
    dimensions:
      - tenant
  - name: published_reports
    description: Count of custom Report Writer reports published in the tenant; tracked for governance rather than billing.
    unit: report
    aggregation: max
    dimensions:
      - tenant
      - business_area
principles:
  - name: Visibility
    description: Track Report Writer usage through Workday's report catalog and the tenant's report execution telemetry; there is no separate invoice line, so visibility is operational rather than financial.
  - name: Allocation
    description: Allocate the cost of report-development work (not the platform capability, which is bundled) to the requesting business area; treat heavy report consumers as a tag for chargeback against the broader Workday subscription.
  - name: Optimization
    description: Retire stale or duplicate custom reports, prefer delivered reports over custom Report Writer where they fit, and route large extracts through scheduled background processes to avoid contention with interactive tenant traffic.
  - name: Accountability
    description: A reporting / analytics lead inside the Workday Center of Excellence governs the report catalog, publishes naming and review standards, and represents reporting workload at Workday tenant-health reviews.
maintainers:
