naftiko: 1.0.0-alpha2
info:
  label: Workday Report Writer Workday WQL API — Query Execution
  description: 'Workday Report Writer Workday WQL API — Query Execution. 1 operations. Lead operation: Workday Report Writer
    Execute a WQL Query. Self-contained Naftiko capability covering one Workday Report Writer business surface.'
  tags:
  - Workday Report Writer
  - Query Execution
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_REPORT_WRITER_API_KEY: WORKDAY_REPORT_WRITER_API_KEY
capability:
  consumes:
  - type: http
    namespace: wql-query-execution
    baseUri: https://{hostname}/ccx/api/wql/v1/{tenant}
    description: Workday Report Writer Workday WQL API — Query Execution business capability. Self-contained, no shared references.
    resources:
    - name: data
      path: /data
      operations:
      - name: executewqlquery
        method: GET
        description: Workday Report Writer Execute a WQL Query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: 'WQL query string using SQL-like syntax. Example: SELECT workdayID, fullName FROM workers WHERE supervisoryOrganization
            = ''IT Department'' ORDER BY fullName LIMIT'
          required: true
    authentication:
      type: bearer
      token: '{{env.WORKDAY_REPORT_WRITER_API_KEY}}'
  exposes:
  - type: rest
    namespace: wql-query-execution-rest
    port: 8080
    description: REST adapter for Workday Report Writer Workday WQL API — Query Execution. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/data
      name: data
      description: REST surface for data.
      operations:
      - method: GET
        name: executewqlquery
        description: Workday Report Writer Execute a WQL Query
        call: wql-query-execution.executewqlquery
        with:
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wql-query-execution-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Report Writer Workday WQL API — Query Execution. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-report-writer-execute-wql
      description: Workday Report Writer Execute a WQL Query
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wql-query-execution.executewqlquery
      with:
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
